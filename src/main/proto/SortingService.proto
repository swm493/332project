// gRPC 서비스 정의 파일
// sbt 컴파일 시 이 파일로부터 Scala 코드가 자동 생성됩니다.
syntax = "proto3";

option java_package = "dist_sort.proto";
option java_outer_classname = "SortingServiceProto";

// scalapb 옵션
import "scalapb/scalapb.proto";
option (scalapb.options) = {
  package_name: "dist_sort.proto"
  flat_package: true
};

message Key {
  bytes key = 1; // 10 bytes
}

message Record {
  bytes key = 1;   // 10 bytes
  bytes value = 2; // 90 bytes
}

message Partition {
  Key startKey = 1; // 이 파티션의 시작 키 (포함)
  Key endKey = 2;   // 이 파티션의 끝 키 (미포함)
  string workerAddress = 3; // 이 파티션을 담당할 워커의 (host:port)
}

// Master가 제공하는 서비스
service MasterService {
  // 1. 워커가 마스터에게 자신을 등록
  rpc RegisterWorker(RegisterWorkerRequest) returns (RegisterWorkerResponse);

  // 2. 워커가 마스터에게 키 샘플을 전송
  rpc SendKeySamples(stream Record) returns (SendKeySamplesResponse);

  // 3. 워커가 로컬 파티셔닝 완료를 보고
  rpc ReportPartitionDone(PartitionDoneRequest) returns (PartitionDoneResponse);

  // 4. 워커가 셔플 완료를 보고
  rpc ReportShuffleDone(ShuffleDoneRequest) returns (ShuffleDoneResponse);

  // 5. 워커가 병합 및 정렬 완료를 보고
  rpc ReportMergeDone(MergeDoneRequest) returns (MergeDoneResponse);
}

// Worker가 제공하는 서비스
service WorkerService {
  // 1. 마스터가 워커에게 파티션 테이블을 전송 (정렬 시작 신호)
  rpc SendPartitionTable(SendPartitionTableRequest) returns (SendPartitionTableResponse);

  // 2. 다른 워커가 이 워커에게 셔플 데이터를 스트리밍
  rpc ShuffleData(stream Record) returns (ShuffleDataResponse);

  // 3. 마스터가 워커에게 병합 시작을 명령
  rpc StartMerge(StartMergeRequest) returns (StartMergeResponse);
}


// --- MasterService 메시지 ---
message RegisterWorkerRequest {
  string workerAddress = 1; // "host:port"
}
message RegisterWorkerResponse {
  bool accepted = 1;
}

message SendKeySamplesResponse {
  bool received = 1;
}

message PartitionDoneRequest {
  string workerAddress = 1;
}
message PartitionDoneResponse {
  bool ack = 1;
}

message ShuffleDoneRequest {
  string workerAddress = 1;
}
message ShuffleDoneResponse {
  bool ack = 1;
}

message MergeDoneRequest {
  string workerAddress = 1;
}
message MergeDoneResponse {
  bool ack = 1;
}

// --- WorkerService 메시지 ---
message SendPartitionTableRequest {
  repeated Partition partitions = 1;
}
message SendPartitionTableResponse {
  bool ack = 1;
}

message ShuffleDataResponse {
  bool received = 1;
}

message StartMergeRequest {}
message StartMergeResponse {
  bool ack = 1;
}